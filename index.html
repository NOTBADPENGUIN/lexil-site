document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iants }}\" as=\"v\" hint-placeholder-count=\"2\"\u003e\n                  \u003cbutton onclick=\"{{ v.onClick }}\" style=\"{{ v.style }}\"\u003e{{ v.label }}\u003c/button\u003e\n                \u003c/sc-for\u003e\n              \u003c/div\u003e\n            \u003c/sc-if\u003e\n\n            \u003cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:15px\"\u003e\n              \u003cdiv style=\"display:flex;flex-direction:column;line-height:1\"\u003e\n                \u003cspan style=\"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#5e5e68\"\u003e{{ p.pricePrefix }}\u003c/span\u003e\n                \u003cspan style=\"font-family:'Oswald';font-weight:700;font-size:25px;color:#fff;margin-top:2px\"\u003e{{ p.priceLabel }}\u003c/span\u003e\n              \u003c/div\u003e\n              \u003cbutton onclick=\"{{ p.onAdd }}\" title=\"Ajouter au panier\" style=\"display:flex;align-items:center;gap:7px;padding:11px 15px;background:#e11d2a;border:1px solid #ff3b47;color:#fff;font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border-radius:4px;box-shadow:0 0 16px rgba(225,29,42,.32)\" style-hover=\"background:#ff2d3a\"\u003e\n                \u003csvg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003cpath d=\"M12 5v14M5 12h14\"\u003e\u003c/path\u003e\u003c/svg\u003eAjouter\n              \u003c/button\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"margin-top:12px;padding-top:12px;border-top:1px solid #20202700;border-top:1px solid #1f1f25;font-family:'Oswald';font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#5e5e68;display:flex;align-items:center;gap:6px\"\u003eVoir le détail \u003csvg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003cpath d=\"M5 12h14M13 6l6 6-6 6\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- ============ RÔLES DONATEUR ============ --\u003e\n  \u003csection id=\"grades\" style=\"max-width:1200px;margin:0 auto;padding:64px 24px 40px\"\u003e\n    \u003cdiv style=\"text-align:center;margin-bottom:8px\"\u003e\n      \u003cdiv style=\"font-family:'Oswald';font-size:13px;letter-spacing:.3em;color:#e11d2a;text-transform:uppercase;margin-bottom:8px\"\u003eRécompenses\u003c/div\u003e\n      \u003ch2 style=\"font-family:'Oswald';font-weight:700;font-size:clamp(30px,4.5vw,46px);line-height:1;color:#f6f4ef;text-transform:uppercase\"\u003eRôles donateur\u003c/h2\u003e\n      \u003cp style=\"margin:12px auto 0;max-width:60ch;font-size:15px;color:#9a9aa2\"\u003eDébloqués \u003cb style=\"color:#f2efe9\"\u003eautomatiquement\u003c/b\u003e selon le total cumulé dépensé. Cumulatif — plus tu soutiens, plus tu montes en grade.\u003c/p\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"display:flex;gap:10px;overflow-x:auto;padding:24px 2px 8px;scroll-snap-type:x proximity\"\u003e\n      \u003csc-for list=\"{{ ranks }}\" as=\"r\" hint-placeholder-count=\"9\"\u003e\n        \u003cdiv style=\"flex:none;width:128px;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 12px;background:#131317;border:1px solid #232329;border-radius:6px;position:relative\" style-hover=\"border-color:#e0a82e\"\u003e\n          \u003cspan style=\"font-size:30px;line-height:1\"\u003e{{ r.glyph }}\u003c/span\u003e\n          \u003cdiv style=\"font-family:'Oswald';font-size:15px;letter-spacing:.04em;color:#f2efe9;text-transform:uppercase;text-align:center\"\u003e{{ r.name }}\u003c/div\u003e\n          \u003cdiv style=\"font-family:'Oswald';font-weight:700;font-size:18px;color:#e0a82e\"\u003e{{ r.amt }}\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- ============ POURQUOI NOUS REJOINDRE ============ --\u003e\n  \u003csection style=\"max-width:1200px;margin:0 auto;padding:48px 24px 24px\"\u003e\n    \u003cdiv style=\"text-align:center;margin-bottom:30px\"\u003e\n      \u003cdiv style=\"font-family:'Oswald';font-size:13px;letter-spacing:.3em;color:#e11d2a;text-transform:uppercase;margin-bottom:8px\"\u003eL'expérience\u003c/div\u003e\n      \u003ch2 style=\"font-family:'Oswald';font-weight:700;font-size:clamp(30px,4.5vw,46px);line-height:1;color:#f6f4ef;text-transform:uppercase\"\u003ePourquoi nous rejoindre\u003c/h2\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px\"\u003e\n      \u003csc-for list=\"{{ features }}\" as=\"f\" hint-placeholder-count=\"4\"\u003e\n        \u003cdiv style=\"padding:26px 22px;background:#131317;border:1px solid #232329;border-radius:6px\" style-hover=\"border-color:#e11d2a\"\u003e\n          \u003cdiv style=\"width:46px;height:46px;display:grid;place-items:center;background:rgba(225,29,42,.1);border:1px solid #3a1a1d;border-radius:6px;margin-bottom:16px\"\u003e\n            \u003csvg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#e11d2a\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003cpath d=\"{{ f.iconPath }}\"\u003e\u003c/path\u003e\u003c/svg\u003e\n          \u003c/div\u003e\n          \u003ch3 style=\"font-family:'Oswald';font-weight:600;font-size:19px;color:#f2efe9;text-transform:uppercase;letter-spacing:.02em\"\u003e{{ f.title }}\u003c/h3\u003e\n          \u003cp style=\"margin-top:9px;font-size:14px;line-height:1.55;color:#9a9aa2\"\u003e{{ f.text }}\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/sc-for\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- ============ RÈGLES ============ --\u003e\n  \u003csection id=\"regles\" style=\"max-width:1200px;margin:0 auto;padding:48px 24px 64px\"\u003e\n    \u003cdiv style=\"border:1px solid #232329;background:linear-gradient(180deg,rgba(19,19,23,.9),rgba(10,10,12,.4));border-radius:6px;padding:34px 30px\"\u003e\n      \u003cdiv style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv style=\"font-family:'Oswald';font-size:13px;letter-spacing:.3em;color:#e11d2a;text-transform:uppercase;margin-bottom:6px\"\u003eÀ lire avant de jouer\u003c/div\u003e\n          \u003ch2 style=\"font-family:'Oswald';font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1;color:#f6f4ef;text-transform:uppercase\"\u003eRègles essentielles\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003ca href=\"{{ discordUrl }}\" target=\"_blank\" style=\"font-family:'Oswald';font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#e11d2a;text-decoration:none\" style-hover=\"color:#ff3b47\"\u003eRèglement complet sur Discord →\u003c/a\u003e\n      \u003c/div\u003e\n      \u003cdiv style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px 28px\"\u003e\n        \u003csc-for list=\"{{ rules }}\" as=\"rule\" hint-placeholder-count=\"5\"\u003e\n          \u003cdiv style=\"display:flex;align-items:flex-start;gap:12px;padding:6px 0\"\u003e\n            \u003cspan style=\"flex:none;width:26px;height:26px;display:grid;place-items:center;background:rgba(225,29,42,.12);border:1px solid #3a1a1d;color:#e11d2a;font-family:'Oswald';font-weight:700;font-size:13px;border-radius:4px\"\u003e{{ rule.n }}\u003c/span\u003e\n            \u003cspan style=\"font-size:14.5px;line-height:1.5;color:#c2c0b8\"\u003e{{ rule.text }}\u003c/span\u003e\n          \u003c/div\u003e\n        \u003c/sc-for\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- ============ REJOINDRE LE SERVEUR ============ --\u003e\n  \u003csection id=\"rejoindre\" style=\"max-width:1200px;margin:0 auto;padding:48px 24px 64px\"\u003e\n    \u003cdiv style=\"text-align:center;margin-bottom:36px\"\u003e\n      \u003cdiv style=\"font-family:'Oswald';font-size:13px;letter-spacing:.3em;color:#e11d2a;text-transform:uppercase;margin-bottom:8px\"\u003eConnexion directe\u003c/div\u003e\n      \u003ch2 style=\"font-family:'Oswald';font-weight:700;font-size:clamp(30px,4.5vw,48px);line-height:1;color:#f6f4ef;text-transform:uppercase\"\u003eRejoindre le serveur\u003c/h2\u003e\n      \u003cp style=\"margin:12px auto 0;max-width:50ch;font-size:15px;color:#9a9aa2\"\u003eConnecte-toi directement via l'IP ou depuis le navigateur de serveurs DayZ.\u003c/p\u003e\n    \u003c/div\u003e\n\n    \u003c!-- Bloc IP + bouton copier --\u003e\n    \u003cdiv style=\"display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:48px\"\u003e\n      \u003cdiv style=\"display:flex;align-items:stretch;gap:0;border:1px solid #2a2a32;border-radius:5px;overflow:hidden;max-width:520px;width:100%;box-shadow:0 0 40px rgba(225,29,42,.12)\"\u003e\n        \u003cdiv style=\"flex:1;padding:16px 20px;background:#0e0e12;display:flex;flex-direction:column;justify-content:center;min-width:0\"\u003e\n          \u003cdiv style=\"font-family:'Oswald';font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#5e5e68;margin-bottom:5px\"\u003eAdresse IP du serveur\u003c/div\u003e\n          \u003cdiv style=\"font-family:'Oswald';font-weight:600;font-size:22px;color:#f2efe9;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\"\u003e{{ serverIpDisplay }}\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cbutton onclick=\"{{ onCopyIp }}\" style=\"{{ copyBtnStyle }}\"\u003e\n          \u003csc-if value=\"{{ copied }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n            \u003csvg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" s        \u003c/div\u003e\n        \u003c/sc-for\u003e\n      \u003c/div\u003e\n\n      \u003cdiv style=\"padding:16px 22px 20px;border-top:1px solid #232329;background:#0b0b0e\"\u003e\n        \u003clabel style=\"display:block;font-family:'Oswald';font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#8a8a93;margin-bottom:7px\"\u003eSteamID64 (obligatoire — pour la livraison en jeu)\u003c/label\u003e\n        \u003cinput value=\"{{ steamId }}\" oninput=\"{{ onSteamInput }}\" placeholder=\"7656119XXXXXXXXXX\" inputmode=\"numeric\" style=\"{{ steamInputStyle }}\"\u003e\n        \u003csc-if value=\"{{ steamError }}\" hint-placeholder-val=\"{{ false }}\"\u003e\n          \u003cdiv style=\"margin-top:7px;font-size:12px;color:#ff5a64;display:flex;align-items:center;gap:6px\"\u003e\u003csvg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"\u003e\u003cpath d=\"M12 8v5M12 17h.01\"\u003e\u003c/path\u003e\u003ccircle cx=\"12\" cy=\"12\" r=\"9\"\u003e\u003c/circle\u003e\u003c/svg\u003eEntre un SteamID64 valide (17 chiffres, commence par 7656).\u003c/div\u003e\n        \u003c/sc-if\u003e\n        \u003cdiv style=\"display:flex;justify-content:space-between;align-items:baseline;margin:16px 0 12px\"\u003e\n          \u003cspan style=\"font-family:'Oswald';font-size:15px;letter-spacing:.1em;color:#8a8a93;text-transform:uppercase\"\u003eTotal\u003c/span\u003e\n          \u003cspan style=\"font-family:'Oswald';font-weight:700;font-size:30px;color:#fff\"\u003e{{ cartTotalLabel }}\u003c/span\u003e\n        \u003c/div\u003e\n        \u003cbutton onclick=\"{{ onCheckout }}\" style=\"{{ checkoutBtnStyle }}\"\u003e\n          \u003csvg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\u003crect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"\u003e\u003c/rect\u003e\u003cpath d=\"M2 10h20\"\u003e\u003c/path\u003e\u003c/svg\u003e\n          Passer la commande\n        \u003c/button\u003e\n        \u003cp style=\"margin-top:10px;font-size:11.5px;color:#4f4f57;text-align:center;line-height:1.5\"\u003ePaiement sécurisé PayNow (bientôt). Livraison automatique en jeu après paiement.\u003c/p\u003e\n      \u003c/div\u003e\n    \u003c/sc-if\u003e\n  \u003c/aside\u003e\n\n\u003c/div\u003e\n\u003c/x-dc\u003e\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\"\u003e\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n\n    /* =====================================================================\n       ⚙️  CONFIGURATION DU SERVEUR  — modifie librement ces valeurs\n       ===================================================================== */\n    const CONFIG = {\n      serveur:   { statut: 'En ligne', joueurs: 43, max: 60, carte: 'Chernarus',\n                   // ⬇️  Colle ici l'IP de ton serveur DayZ (ex: '185.12.34.56:2302')\n                   ip: '' },\n      discord:   'https://discord.gg/t46RE8hYs7',\n      // 🔗 URL de paiement PayNow. Laisse vide ('') pour afficher\n      //    un récapitulatif côté client. Quand tu auras ton lien Stripe,\n      //    colle-le ici et le bouton « Passer la commande » y redirigera.\n      checkoutUrl: '',\n      // 🔗 URL de ton backend Node.js (ex: 'https://api.lexil.fr')\n      // Laisse vide ('') pour rester en mode simulation (sans backend)\n      backendUrl: 'https://lexil-auth-production.up.railway.app'\n    };\n\n    /* =====================================================================\n       🧩  OPTIONS DE DURÉE (couleurs killfeed / chat / clan)\n       ===================================================================== */\n    const DUREES = [\n      { key: '30j',  label: '30 jours', prix: 9.99  },\n      { key: 'life', label: 'Lifetime', prix: 34.99 }\n    ];\n\n    /* =====================================================================\n       🛒  CATALOGUE PRODUITS — modifie noms, prix, descriptions ici\n       Chaque produit : { id, cat, nom, court, long, features[], prix }\n       ou avec durées : { ..., variantes: DUREES } (au lieu de \"prix\")\n       badge optionnel : 'Populaire' | 'Meilleure offre'\n       ===================================================================== */\n    const PRODUITS = [\n      { id:'prio', cat:'confort', nom:'File prioritaire', court:\"Passe devant la file d'attente (30 jours).\",\n        long:\"Fini les files interminables aux heures de pointe. Connecte-toi en priorité sur L'Exil pendant 30 jours, même serveur plein.\",\n        features:[\"Accès prioritaire à la connexion\",\"Valable 30 jours\",\"Idéal aux heures de pointe\",\"Activation automatique\"], prix:15 },\n\n      { id:'item', cat:'cosmetique', nom:'Item cosmétique', court:\"Une pièce retexturée à ton image.\",\n        long:\"Une pièce d'équipement retexturée selon tes envies. Donne du caractère à ta tenue avec un design unique, validé par l'équipe.\",\n        features:[\"1 pièce au choix\",\"Retexture simple\",\"100% cosmétique\",\"Validé par l'équipe\"], prix:11.99 },\n      { id:'item-adv', cat:'cosmetique', nom:'Item — Retexture avancé', court:\"Une pièce, design premium détaillé.\",\n        long:\"Une pièce retexturée avec un niveau de détail premium : logos, motifs et finitions soignées pour vraiment te démarquer.\",\n        features:[\"1 pièce au choix\",\"Design avancé & détaillé\",\"Logos / motifs / texte\",\"Pour se démarquer\"], prix:19.99 },\n      { id:'tenue-s', cat:'cosmetique', nom:'Tenue complète — Simple', court:\"Toute la tenue retexturée, style cohérent.\",\n        long:\"Toute ta tenue retexturée dans un style cohérent. Le pack idéal pour un look complet sans te ruiner.\",\n        features:[\"Tenue complète\",\"Retexture simple\",\"Style harmonisé\",\"100% cosmétique\"], prix:19.99 },\n      { id:'tenue-s-plus', cat:'cosmetique', nom:'Tenue simple + protections', court:\"Tenue simple + armure, casque, veste & sac.\",\n        long:\"Ta tenue simple accompagnée des protections assorties : armure, casque, veste et sac coordonnés pour un set complet.\",\n        features:[\"Tenue complète + protections\",\"Armure, casque, veste & sac\",\"Retexture simple\",\"Set entièrement coordonné\"], prix:29.99 },\n      { id:'tenue-a', cat:'cosmetique', nom:'Tenue complète — Avancé', court:\"Toute la tenue, design avancé détaillé.\",\n        long:\"Toute ta tenue avec un design avancé : finitions détaillées, logos et motifs personnalisés pour un look qui claque.\",\n        features:[\"Tenue complète\",\"Design avancé & détaillé\",\"Logos / motifs perso\",\"Look qui claque\"], prix:34.99 },\n      { id:'tenue-a-plus', cat:'cosmetique', nom:'Tenue avancée + protections', court:\"Le pack ultime : avancé + protections.\", badge:'Meilleure offre',\n        long:\"Le pack ultime : tenue avancée + protections (armure, casque, veste, sac) au même niveau de détail premium.\",\n        features:[\"Tenue + protections\",\"Design avancé sur tout le set\",\"Armure, casque, veste & sac\",\"Le set le plus complet\"], prix:44.99 },\n      { id:'drip', cat:'cosmetique', nom:'Drip Menu', court:\"Menu tenues cosmétiques in-game (30 jours).\", badge:'Populaire',\n        long:\"Accès au menu cosmétique en jeu : change de tenue à chaque respawn et affiche ton style à tout moment. (Fonction à coder ensemble.)\",\n        features:[\"Accès menu tenues in-game\",\"Change de fit quand tu veux\",\"Valable 30 jours\",\"Style à chaque respawn\"], prix:14.99 },\n\n      { id:'gun-b', cat:'armes', nom:\"Retexture d'arme — Basic\", court:\"Reskin cosmétique de ton arme.\",\n        long:\"Reskin cosmétique de ton arme préférée. Aucune incidence sur les stats — juste du style sur le champ de bataille.\",\n        features:[\"Reskin d'1 arme\",\"100% cosmétique\",\"Aucun avantage de jeu\",\"Validé par l'équipe\"], prix:19.99 },\n      { id:'gun-a', cat:'armes', nom:\"Retexture d'arme — Avancé\", court:\"Reskin d'arme premium détaillé.\",\n        long:\"Reskin d'arme avec un niveau de détail premium : camos, motifs et finitions avancées entièrement personnalisés.\",\n        features:[\"Reskin d'1 arme\",\"Design avancé\",\"Camos & motifs détaillés\",\"Finition premium\"], prix:34.99 },\n\n      { id:'heli-b', cat:'vehicules', nom:'Reskin hélico — Basic', court:\"Livrée cosmétique pour ton hélico.\",\n        long:\"Donne une livrée unique à ton hélicoptère. Repère-le de loin et impose le style en escadrille.\",\n        features:[\"Reskin d'1 hélicoptère\",\"Livrée cosmétique\",\"100% cosmétique\",\"Visible par tous\"], prix:50 },\n      { id:'heli-a', cat:'vehicules', nom:'Reskin hélico — Avancé', court:\"Livrée d'hélico premium sur mesure.\",\n        long:\"Livrée d'hélicoptère premium : design détaillé, logos et motifs sur mesure pour le top du style aérien.\",\n        features:[\"Reskin d'1 hélicoptère\",\"Design avancé & détaillé\",\"Logos / motifs sur mesure\",\"Top du style aérien\"], prix:65 },\n\n      { id:'col-kf', cat:'couleurs', nom:'Couleur de nom — Killfeed', court:\"Ton pseudo coloré dans le killfeed.\", badge:'Populaire',\n        long:\"Ton pseudo s'affiche dans la couleur de ton choix à chaque kill dans le killfeed. Visible par tous les joueurs.\",\n        features:[\"Couleur de pseudo au killfeed\",\"Couleur au choix\",\"Visible par tous\",\"30 jours ou à vie\"], variantes:DUREES },\n      { id:'col-chat', cat:'couleurs', nom:'Couleur de chat', court:\"Écris en couleur dans le chat.\",\n        long:\"Écris dans le chat du serveur avec une couleur personnalisée et démarque-toi à chaque message.\",\n        features:[\"Couleur de texte au chat\",\"Couleur au choix\",\"Visible par tous\",\"30 jours ou à vie\"], variantes:DUREES },\n      { id:'col-clan', cat:'couleurs', nom:'Couleur de clan tag', court:\"Le tag de ton clan en couleur.\",\n        long:\"Le tag de ton clan affiché dans une couleur unique et reconnaissable. À acheter par le chef de groupe.\",\n        features:[\"Couleur de clan tag\",\"À acheter par le chef de groupe\",\"Unis ton équipe\",\"30 jours ou à vie\"], variantes:DUREES },\n\n      { id:'role', cat:'discord', nom:'Rôle Discord personnalisé', court:\"Un rôle Discord sur-mesure rien qu'à toi.\",\n        long:\"Un rôle Discord personnalisé rien qu'à toi : nom et couleur au choix sur le serveur Discord de L'Exil. Affiche ton soutien.\",\n        features:[\"Rôle Discord sur-mesure\",\"Nom & couleur au choix\",\"Visible sur le Discord\",\"Affiche ton soutien\"], prix:15 },\n    ];\n\n    // Icônes (tracé SVG monoline par produit) + libellés de catégorie\n    const ICON = {\n      prio:\"M7 21V9 M3 13l4-4 4 4 M15 21V4 M11 9l4-5 4 5\",\n      item:\"M3.5 12.5 12 4h6.5v6.5L10 19zM15.5 7.5h.01\",\n      \"item-adv\":\"M3.5 12.5 12 4h5v5L9.5 16.5zM14.5 6.5h.01 M18 13l1 2.2 2.2 1-2.2 1L18 20.4l-1-2.2-2.2-1 2.2-1z\",\n      \"tenue-s\":\"M8.5 4 4 7l2 3.2 2.2-1.2V20h7.6V9l2.2 1.2 2-3.2L17.5 4 15 6.3h-4z\",\n      \"tenue-s-plus\":\"M8.5 4 4 7l2 3.2 2.2-1.2V20h6V9l2.2 1.2 2-3.2L17.5 4 15 6.3h-4z M17.5 12.5l3.5 1.2v3.3c0 2.3-1.7 3.4-3.5 4-1.8-.6-3.5-1.7-3.5-4v-3.3z\",\n      \"tenue-a\":\"M8.5 4 4 7l2 3.2 2.2-1.2V20h7.6V9l2.2 1.2 2-3.2L17.5 4 15 6.3h-4z M12 11l.9 2 2 .9-2 .9L12 17l-.9-2-2-.9 2-.9z\",\n      \"tenue-a-plus\":\"M8 4 4.5 7l1.6 3 1.9-1V19h5.5V9l1.9 1 1.6-3L15.5 4 13.5 6h-3.5z M16.5 11.5l3.5 1.2v3.3c0 2.3-1.7 3.4-3.5 4-1.8-.6-3.5-1.7-3.5-4v-3.3z\",\n      drip:\"M12 4a2 2 0 0 1 1.2 3.6L12 8.5V10 M4 17l8-5 8 5-1 3.5H5z\",\n      \"gun-b\":\"M3 10h11l2 2.2h5v3h-3.2l-1.2-1.2H13V18 M6 12.2v3 M14 10V7.5\",\n      \"gun-a\":\"M3 11h9l1.7 2H18v2.6h-2.8l-1-1H12V17 M6 13v2.5 M19 5l.9 2 2 .9-2 .9L19 12l-.9-2-2-.9 2-.9z\",\n      \"heli-b\":\"M3 6h18 M12 6v3.5 M6 12.5h9.5l2 3.2H8z M11 15.7v3 M8 18.7h7 M16 9.5l4-2.2\",\n      \"heli-a\":\"M3 6h13 M10 6v3.2 M5 12h8l1.7 2.8H6.6z M9.6 14.8v2.8 M7 17.6h6 M19 4.5l.9 2 2 .9-2 .9L19 11.2l-.9-2-2-.9 2-.9z\",\n      \"col-kf\":\"M12 3v3.2 M12 17.8V21 M3 12h3.2 M17.8 12H21 M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6 M12 11.7v.01\",\n      \"col-chat\":\"M4 5.5h16v9.5H9.5L5.5 19v-4H4z M8 9.5h8 M8 12.3h5\",\n      \"col-clan\":\"M6 3.5v17 M6 4.5h11.5l-2.2 3.4 2.2 3.4H6\",\n      role:\"M12 7.2a3 3 0 1 0 0 6 3 3 0 0 0 0-6 M5 20c.4-4 3.2-5.8 7-5.8s6.6 1.8 7 5.8\"\n    };\n    const CATLABEL = { confort:\"Confort\", cosmetique:\"Cosmétique\", armes:\"Armes\", vehicules:\"Véhicules\", couleurs:\"Couleurs\", discord:\"Discord\" };\n\n    this.CONFIG = CONFIG;\n    this.PRODUITS = PRODUITS.map(p=\u003e({...p, iconPath:ICON[p.id], catLabel:CATLABEL[p.cat]}));\n    this.CATS = [\n      {key:'all',label:'Tout'},{key:'confort',label:'Confort'},{key:'cosmetique',label:'Cosmétique'},\n      {key:'armes',label:'Armes'},{key:'vehicules',label:'Véhicules'},{key:'couleurs',label:'Couleurs'},{key:'discord',label:'Discord'},\n    ];\n\n    // Sections statiques (Pourquoi nous rejoindre / Règles / Rôles)\n    this.FEATURES = [\n      {title:'PvP hardcore', text:\"Combats intenses, full loot, zéro pitié. Le serveur FR/EU le plus nerveux.\", iconPath:\"M12 3v3.2 M12 17.8V21 M3 12h3.2 M17.8 12H21 M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8\"},\n      {title:'Loot rare', text:\"Tables de loot retravaillées : le bon stuff se mérite et se défend.\", iconPath:\"M3 8l9-4 9 4-9 4z M3 8v8l9 4 9-4V8 M12 12v8\"},\n      {title:'Snipers customs maison', text:\"Des armes de précision exclusives, modélisées par notre équipe.\", iconPath:\"M3 11h9l2 2h6v2h-3l-1-1h-3v3 M12 4v3 M12 4a3 3 0 0 1 0 6 M6 13v3\"},\n      {title:'Traders & safezones', text:\"Échange en sécurité dans nos safezones, puis replonge dans le chaos.\", iconPath:\"M12 2 4 5v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V5l-8-3Z M9 12l2 2 4-4\"},\n    ];\n    this.RULES = [\n      {n:'1', text:\"Triche, cheat ou logiciel tiers = bannissement définitif et immédiat.\"},\n      {n:'2', text:\"Glitch, duplication et exploits de map sont strictement interdits.\"},\n      {n:'3', text:\"Respecte les safezones : aucun tir ni vol n'y est toléré.\"},\n      {n:'4', text:\"Racisme, harcèlement et toxicité excessive entraînent une sanction.\"},\n      {n:'5', text:\"Le stream-sniping et le combat-logging sont punis.\"},\n      {n:'6', text:\"Achats 100% cosmétiques : aucun avantage de jeu, jamais.\"},\n    ];\n    this.RANKS = [{glyph:'🥉',name:'Bronze',amt:'5€'},{glyph:'🥈',name:'Silver',amt:'15€'},{glyph:'🥇',name:'Gold',amt:'30€'},{glyph:'💠',name:'Platinum',amt:'50€'},{glyph:'💎',name:'Diamond',amt:'100€'},{glyph:'🔥',name:'Master',amt:'150€'},{glyph:'👑',name:'Elite',amt:'200€'},{glyph:'⭐',name:'Legendary',amt:'250€'},{glyph:'🌟',name:'Ultimate',amt:'300€'}];\n\n    this.STEPS = [\n      { n:'1', title:'Installe DayZ', text:'Disponible sur Steam. Assure-toi d\\'avoir la dernière version du jeu.' },\n      { n:'2', title:'Ouvre le navigateur de serveurs', text:'Dans le menu principal DayZ, clique sur \"Serveurs communautaires\".' },\n      { n:'3', title:'Entre l\\'IP du serveur', text:'Colle l\\'adresse IP ci-dessus dans la barre de recherche directe.' },\n      { n:'4', title:'Connecte-toi & survive', text:'Rejoins le serveur et prépare-toi : ici, tout le monde peut te tuer.' },\n    ];\n\n    const sv = {};\n    this.PRODUITS.forEach(p=\u003e{ if(p.variantes) sv[p.id] = p.variantes[0].key; });\n\n    // Utilisateurs de démo (simulation Steam OpenID — à remplacer par vrai OAuth)\n    this.DEMO_USERS = [\n      { name:'Survivant_FR', steamName:'Survivant_FR', discordName:'Survivant#4521',\n        steamId:'76561198012345678', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=lexil1&backgroundColor=1a1a2e' },\n      { name:'GhostRaider', steamName:'GhostRaider', discordName:'GhostRaider#7731',\n        steamId:'76561198087654321', avatar:'https://api.dicebear.com/7.x/bottts/svg?seed=lexil2&backgroundColor=1a1a2e' },\n    ];\n\n    this.state = { activeCat:'all', cart:{}, cartOpen:false, selectedVariant:sv, selectedId:null,\n      steamId:'', steamError:false, order:null, copied:false,\n      user:null, userMenuOpen:false, currentPage:null,\n      // Compte & rôle\n      account:null, isFounder:false,\n      // Dashboard admin\n      dashboardOpen:false, dashTab:'joueurs',\n      adminToken:'', adminAuthed:false, adminUsers:[], adminLoading:false, adminMsg:'',\n      adminCreditSteamId:'', adminCreditAmount:'', adminCreditNote:'',\n      adminGiveId:'', adminGiveSteamId:'',\n      adminRemoveSteamId:'', adminRemoveOrderId:'',\n      // Couleurs\n      colorKillfeed:'#ffffff', colorChat:'#ffffff', colorClan:'#ffffff',\n      colorSaving:false, colorMsg:'',\n      // Rôle Discord\n      discordRoleName:'', discordRoleColor:'#e11d2a', roleSaving:false, roleMsg:'' };\n  }\n\n  // ---- AUTH STEAM ----\n  // Si CONFIG.backendUrl est rempli → vrai OpenID Steam via le backend Node.js\n  // Sinon → simulation locale pour les tests\n\n  onSteamLogin(){\n    const backend = (this.CONFIG.backendUrl||'').trim();\n    if(backend){\n      // Vrai backend : redirige vers /auth/steam\n      window.location.href = backend + '/auth/steam';\n    } else {\n      // Mode simulation : choisit un user de démo aléatoirement\n      const u = this.DEMO_USERS[Math.floor(Math.random()*this.DEMO_USERS.length)];\n      this.setState({ user:u, userMenuOpen:false, steamId:u.steamId });\n      try{ localStorage.setItem('lexil_steamid', u.steamId); localStorage.setItem('lexil_user', JSON.stringify(u)); }catch(e){}\n    }\n  }\n\n  onSignOut(){\n    const backend = (this.CONFIG.backendUrl||'').trim();\n    if(backend){\n      fetch(backend+'/api/logout', {method:'POST',credentials:'include'})\n        .catch(()=\u003e{})\n        .finally(()=\u003e{\n          this.setState({ user:null, userMenuOpen:false, steamId:'' });\n          try{ localStorage.removeItem('lexil_user'); localStorage.removeItem('lexil_steamid'); }catch(e){}\n        });\n    } else {\n      this.setState({ user:null, userMenuOpen:false, steamId:'' });\n      try{ localStorage.removeItem('lexil_user'); localStorage.removeItem('lexil_steamid'); }catch(e){}\n    }\n  }\n\n  toggleUserMenu(){ this.setState(s=\u003e({userMenuOpen:!s.userMenuOpen})); }\n  openPage(page){ this.setState({currentPage:page, userMenuOpen:false}); }\n  closePage(){ this.setState({currentPage:null}); }\n  openDashboard(){ window.location.href='/admin.html'; }\n  closeDashboard(){ this.setState({dashboardOpen:false}); }\n\n  // ---- CHARGEMENT COMPTE ----\n  async loadAccount(steamId){\n    if(!steamId) return;\n    const B = 'https://lexil-auth-production.up.railway.app';\n    try{\n      const d = await fetch(B+'/api/account?steamId='+steamId).then(r=\u003er.json());\n      const p = {account:d};\n      if(d.colors){\n        p.colorKillfeed = d.colors.killfeed||'#ffffff';\n        p.colorChat     = d.colors.chat    ||'#ffffff';\n        p.colorClan     = d.colors.clan    ||'#ffffff';\n      }\n      if(d.customRole){\n        p.discordRoleName  = d.customRole.name ||'';\n        p.discordRoleColor = d.customRole.color||'#e11d2a';\n      }\n      this.setState(p);\n    }catch(e){}\n  }\n\n  async checkFounder(steamId){\n    if(!steamId) return;\n    try{\n      const d = await fetch('https://lexil-auth-production.up.railway.app/api/is-founder?steamId='+steamId).then(r=\u003er.json());\n      if(d.founder) this.setState({isFounder:true});\n    }catch(e){}\n  }\n\n  // ---- COULEURS ----\n  async saveColor(type, color){\n    const steamId=(this.state.steamId||'').trim(); if(!steamId) return;\n    this.setState({colorSaving:true, colorMsg:''});\n    try{\n      const r = await fetch('https://lexil-auth-production.up.railway.app/api/customize/color',{\n        method:'POST', headers:{'Content-Type':'application/json'},\n        body:JSON.stringify({steamId, type, color})\n      }).then(r=\u003er.json());\n      if(r.ok) this.setState({colorMsg:'✓ Couleur sauvegardée !', colorSaving:false, ['color'+type.charAt(0).toUpperCase()+type.slice(1)]:color});\n      else this.setState({colorMsg:r.error||'Erreur 403 — tu ne possèdes pas cette couleur', colorSaving:false});\n    }catch(e){ this.setState({colorMsg:'Erreur réseau', colorSaving:false}); }\n  }\n\n  // ---- RÔLE DISCORD ----\n  async saveDiscordRole(){\n    const steamId=(this.state.steamId||'').trim(); if(!steamId) return;\n    if(!this.state.discordRoleName.trim()){ this.setState({roleMsg:'Entre un nom de rôle.'}); return; }\n    this.setState({roleSaving:true, roleMsg:''});\n    try{\n      const r = await fetch('https://lexil-auth-production.up.railway.app/api/customize/discord-role',{\n        method:'POST', headers:{'Content-Type':'application/json'},\n        body:JSON.stringify({steamId, name:this.state.discordRoleName, color:this.state.discordRoleColor})\n      }).then(r=\u003er.json());\n      if(r.ok) this.setState({roleMsg:'✓ Rôle mis à jour !', roleSaving:false});\n      else this.setState({roleMsg:r.error||'Erreur', roleSaving:false});\n    }catch(e){ this.setState({roleMsg:'Erreur réseau', roleSaving:false}); }\n  }\n\n  // ---- ADMIN ----\n  async adminAuth(){\n    const token=(this.state.adminToken||'').trim(), sid=((this.state.steamId)||localStorage.getItem('lexil_steamid')||'').trim();\n    if(!token||!sid){ this.setState({adminMsg:'Token ou SteamID manquant.'}); return; }\n    this.setState({adminLoading:true, adminMsg:''});\n    try{\n      const r = await fetch('https://lexil-auth-production.up.railway.app/api/admin/users',{\n        headers:{'x-admin-token':token,'x-admin-steamid':sid}\n      });\n      if(r.status===401||r.status===403){ this.setState({adminMsg:'Mot de passe incorrect.', adminLoading:false}); return; }\n      const d = await r.json();\n      this.setState({adminAuthed:true, adminUsers:Array.isArray(d)?d:[], adminLoading:false});\n    }catch(e){ this.setState({adminMsg:'Erreur réseau', adminLoading:false}); }\n  }\n  async adminLoadUsers(){\n    const token=(this.state.adminToken||'').trim(), sid=((this.state.steamId)||localStorage.getItem('lexil_steamid')||'').trim();\n    try{ const d=await fetch('https://lexil-auth-production.up.railway.app/api/admin/users',{headers:{'x-admin-token':token,'x-admin-steamid':sid}}).then(r=\u003er.json()); if(Array.isArray(d))this.setState({adminUsers:d}); }catch(e){}\n  }\n  async adminCredit(){\n    const token=(this.state.adminToken||'').trim(), sid=((this.state.steamId)||localStorage.getItem('lexil_steamid')||'').trim();\n    if(!this.state.adminCreditSteamId||!this.state.adminCreditAmount){ this.setState({adminMsg:'Remplis SteamID + montant.'}); return; }\n    this.setState({adminLoading:true,adminMsg:''});\n    try{\n      const r=await fetch('https://lexil-auth-production.up.railway.app/api/admin/credit',{\n        method:'POST',headers:{'Content-Type':'application/json','x-admin-token':token,'x-admin-steamid':sid},\n        body:JSON.stringify({steamId:this.state.adminCreditSteamId,amount:parseFloat(this.state.adminCreditAmount)||0,note:this.state.adminCreditNote})\n      }).then(r=\u003er.json());\n      this.setState({adminMsg:r.ok?'✓ Crédit ajouté':r.error||'Erreur',adminLoading:false,adminCreditSteamId:'',adminCreditAmount:'',adminCreditNote:''});\n      this.adminLoadUsers();\n    }catch(e){this.setState({adminMsg:'Erreur réseau',adminLoading:false});}\n  }\n  async adminGive(){\n    const token=(this.state.adminToken||'').trim(), sid=((this.state.steamId)||localStorage.getItem('lexil_steamid')||'').trim();\n    if(!this.state.adminGiveId||!this.state.adminGiveSteamId){ this.setState({adminMsg:'Remplis SteamID + ID produit.'}); return; }\n    this.setState({adminLoading:true,adminMsg:''});\n    try{\n      const r=await fetch('https://lexil-auth-production.up.railway.app/api/admin/give',{\n        method:'POST',headers:{'Content-Type':'application/json','x-admin-token':token,'x-admin-steamid':sid},\n        body:JSON.stringify({steamId:this.state.adminGiveSteamId,orderId:this.state.adminGiveId})\n      }).then(r=\u003er.json());\n      this.setState({adminMsg:r.ok?'✓ Article accordé':r.error||'Erreur',adminLoading:false,adminGiveId:'',adminGiveSteamId:''});\n    }catch(e){this.setState({adminMsg:'Erreur réseau',adminLoading:false});}\n  }\n  async adminRemoveOrder(){\n    const token=(this.state.adminToken||'').trim(), sid=((this.state.steamId)||localStorage.getItem('lexil_steamid')||'').trim();\n    if(!this.state.adminRemoveSteamId||!this.state.adminRemoveOrderId){ this.setState({adminMsg:'Remplis SteamID + ID commande.'}); return; }\n    this.setState({adminLoading:true,adminMsg:''});\n    try{\n      const r=await fetch('https://lexil-auth-production.up.railway.app/api/admin/remove-order',{\n        method:'POST',headers:{'Content-Type':'application/json','x-admin-token':token,'x-admin-steamid':sid},\n        body:JSON.stringify({steamId:this.state.adminRemoveSteamId,orderId:this.state.adminRemoveOrderId})\n      }).then(r=\u003er.json());\n      this.setState({adminMsg:r.ok?'✓ Commande supprimée':r.error||'Erreur',adminLoading:false,adminRemoveSteamId:'',adminRemoveOrderId:''});\n      this.adminLoadUsers();\n    }catch(e){this.setState({adminMsg:'Erreur réseau',adminLoading:false});}\n  }\n\n  onCopyIp(){\n    const ip = (this.CONFIG.serveur.ip||'').trim();\n    if(!ip) return;\n    if(navigator.clipboard){ navigator.clipboard.writeText(ip).catch(()=\u003e{}); }\n    else{ try{ const t=document.createElement('textarea'); t.value=ip; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }catch(e){} }\n    this.setState({copied:true});\n    setTimeout(()=\u003ethis.setState({copied:false}), 2200);\n  }\n\n  /* ---- persistance localStorage ---- */\n  componentDidMount(){\n    // Restaure le panier et le steamId depuis localStorage\n    try{\n      const c = JSON.parse(localStorage.getItem('lexil_cart') || 'null');\n      const s = localStorage.getItem('lexil_steamid') || '';\n      const u = JSON.parse(localStorage.getItem('lexil_user') || 'null');\n      const patch = {};\n      if(c && typeof c ==
